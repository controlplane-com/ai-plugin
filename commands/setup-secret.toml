description = "Set up complete secret access for a Control Plane workload (identity + policy + injection)"

prompt = """
Set up complete secret access for a Control Plane workload: {{args}}

Use the cpln-secret-setup-wizard agent to orchestrate the mandatory 3-step secret access chain:
1. Create the secret (or identify an existing one) using type-specific commands (create-opaque, create-tls, etc.)
2. Create an identity and link it to the workload
3. Create a policy granting reveal permission on the secret
4. Inject the secret as an environment variable or volume mount
5. Verify the complete chain works
6. Redeploy the workload with `cpln apply --ready` to block until healthy
"""
