name: Checks

# Content validation on every push/PR (the release workflow only fires on version tags).
# Checks that every MCP tool mentioned in skills/rules/agents/commands exists in the MCP
# server's registry and respects toolset-profile visibility (see scripts/check-tool-mentions.mjs;
# regenerate scripts/tools-manifest.json from the MCP server repo when tools change).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Tool mentions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tool mentions exist and respect toolset profiles
        run: node scripts/check-tool-mentions.mjs
